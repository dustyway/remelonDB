name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Which areas did this push actually touch? Expensive jobs below gate
  # on these outputs, so a docs-only change costs minutes, not an NDK
  # build and three browser matrices. The `test` job always runs.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      web: ${{ steps.filter.outputs.web }}
      examples: ${{ steps.filter.outputs.examples }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            cpp:
              - 'packages/driver-rn-cpp/**'
              - '.github/workflows/ci.yml'
            web:
              - 'packages/driver-web/**'
              - 'packages/core/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            examples:
              - 'examples/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            packages:
              - 'packages/**'
              - 'scripts/**'
              - 'README.md'
              - 'docs/tutorial.md'
              - 'docs/sync-tour.md'
              - 'docs/sync_model.qnt'
              - 'examples/todo-sync/backend/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      # docs/sync-tour.md replayed against the example server — the
      # tour's captured responses cannot drift from behavior
      - run: pnpm check:sync-tour
      # The sync protocol's formal model (docs/sync-wire.md) must stay
      # well-typed. Simulation and bounded verification are an offline
      # practice run when the model changes (see docs/formal-model.md) —
      # 0.32.0's run fetches a Rust evaluator from GitHub, too flaky for CI.
      - run: npx --yes @informalsystems/quint@0.32.0 typecheck docs/sync_model.qnt

  # Consume the packed tarballs from a plain Node project — proves the
  # published artifacts (dist exports, workspace-dep rewriting) work for
  # consumers with no TS toolchain, not just inside the monorepo.
  pack-consume:
    needs: changes
    if: needs.changes.outputs.packages == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # The tutorial's code sections and the README's API taste, executed
      # against the built packages — docs cannot drift from the API.
      - run: pnpm check:tutorial
      - run: pnpm check:readme
      - name: Pack and consume from plain Node
        run: |
          mkdir -p /tmp/tarballs /tmp/consume
          pnpm -r --filter './packages/*' pack --pack-destination /tmp/tarballs
          CORE=$(ls /tmp/tarballs/remelondb-core-*.tgz)
          NODE_DRV=$(ls /tmp/tarballs/remelondb-driver-node-*.tgz)
          SERVER=$(ls /tmp/tarballs/remelondb-server-*.tgz)
          cd /tmp/consume
          node -e "
            require('fs').writeFileSync('package.json', JSON.stringify({
              name: 'consume', private: true, type: 'module',
              dependencies: {
                '@remelondb/core': 'file:' + process.argv[1],
                '@remelondb/driver-node': 'file:' + process.argv[2],
                '@remelondb/server': 'file:' + process.argv[3],
                'zod': '^4.0.0',
              },
              overrides: { '@remelondb/core': 'file:' + process.argv[1] },
            }, null, 2))
          " "$CORE" "$NODE_DRV" "$SERVER"
          npm install
          cat > main.mjs <<'EOF'
          import { appSchema, column as c, table, Database, ModelFor, Q } from '@remelondb/core'
          import { NodeSqliteDriver } from '@remelondb/driver-node'
          import { zodTable, syncSchemas } from '@remelondb/core/zod'
          import { createSyncEngine, createMemoryStore } from '@remelondb/server'
          import { z } from 'zod'

          const tasks = table('tasks', { name: c.string() })
          const schema = appSchema({ version: 1, tables: [tasks] })
          class Task extends ModelFor(tasks) {}
          const db = await Database.open({ driver: new NodeSqliteDriver(), schema, modelClasses: [Task], name: ':memory:' })
          await db.write(() => db.get(Task).create({ name: 'ci' }))
          const rows = await db.get(Task).query(Q.where('name', 'ci')).fetch()
          if (rows.length !== 1) throw new Error('tarball consumption failed')

          const Item = z.object({ name: z.string() })
          const items = zodTable('items', Item)
          if (items.columns.name.type !== 'string') throw new Error('zodTable failed')
          const engine = createSyncEngine({ store: createMemoryStore(), tables: { items: {} } })
          const h = engine.as('u1')
          const first = await h.pull({ cursor: null, schemaVersion: 1, migration: null })
          await h.push({ changes: { items: { created: [{ id: 'i1', name: 'hi' }], updated: [], deleted: [] } }, cursor: first.cursor })
          const again = await h.pull({ cursor: null, schemaVersion: 1, migration: null })
          syncSchemas({ items: Item }).pullResult.parse(again)
          if (again.changes.items.updated.length !== 1) throw new Error('server roundtrip failed')
          console.log('pack-consume OK')
          EOF
          node main.mjs

  # The example app's story end to end in real Chromium: two isolated
  # browser contexts (separate OPFS each) against the real sync server —
  # create/edit propagation both directions, offline writes staying
  # local, recovery pushing the backlog.
  example-e2e:
    needs: changes
    if: needs.changes.outputs.examples == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter example-todo-sync typecheck
      - run: pnpm --filter example-todo-sync-web typecheck
      - run: pnpm --filter example-todo-sync-web exec playwright install --with-deps chromium
      - run: pnpm --filter example-todo-sync-web e2e

  # The web driver's full conformance suite in real Chromium and Firefox:
  # real Worker, real OPFS SAH-pool storage, durability across worker
  # termination.
  web-browser:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @remelondb/driver-web exec playwright install --with-deps chromium firefox
      - run: pnpm --filter @remelondb/driver-web test:browser
      - run: BROWSER=firefox pnpm --filter @remelondb/driver-web test:browser

  # WebKit and real Safari. Both need macOS: Linux WebKit (GTK port)
  # doesn't ship the OPFS sync-access-handle APIs at all ("Missing
  # required OPFS APIs"), and safaridriver only exists here.
  web-browser-webkit-safari:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    # healthy runs finish well under 5 minutes; a hung Safari session
    # otherwise burns the full timeout at the 10x macOS multiplier
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v6
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-webkit-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm --filter @remelondb/driver-web exec playwright install webkit
      - run: BROWSER=webkit pnpm --filter @remelondb/driver-web test:browser
      # Probe safaridriver directly first: enable it, create + delete a
      # session over raw HTTP, and surface the result as an annotation.
      # Separates "safaridriver is broken on this runner" from "the
      # vitest/webdriverio layer is broken".
      - run: |
          sudo safaridriver --enable
          safaridriver --version
          safaridriver -p 55701 &
          sleep 2
          PROBE=$(curl -s -X POST http://127.0.0.1:55701/session \
            -H "Content-Type: application/json" \
            -d '{"capabilities":{"alwaysMatch":{"browserName":"safari"}}}')
          echo "::notice title=safaridriver probe::${PROBE:0:600}"
          SID=$(echo "$PROBE" | /usr/bin/python3 -c "import json,sys; print(json.load(sys.stdin)['value'].get('sessionId',''))" || true)
          [ -n "$SID" ] && curl -s -X DELETE "http://127.0.0.1:55701/session/$SID" > /dev/null
          pkill -f safaridriver || true
          pkill -x Safari || true
      # One retry, with stray Safari/safaridriver processes from a failed
      # first attempt killed in between (Safari allows only one automation
      # session; orphans from attempt 1 block attempt 2). On double
      # failure the output tail becomes an annotation — annotations are
      # readable on the run page without log access.
      - run: |
          run_safari() {
            BROWSER=safari pnpm --filter @remelondb/driver-web test:browser 2>&1 | tee /tmp/safari.log
            return ${PIPESTATUS[0]}
          }
          run_safari || {
            echo "--- first Safari attempt failed, cleaning up and retrying once"
            pkill -f safaridriver || true
            pkill -x Safari || true
            sleep 5
            run_safari
          } || {
            MSG=$(tail -c 3000 /tmp/safari.log | tr -d '\r' | /usr/bin/python3 -c "import sys; print(sys.stdin.read().replace('%','%25').replace('\n','%0A'))")
            echo "::error title=Safari step failed (tail)::${MSG}"
            exit 1
          }

  # Compiles the RN driver's C++ TurboModule with a real NDK inside a real
  # RN app — the device-verification items reachable without hardware:
  # codegen, cxx-module autolinking glue, prefab JSI linkage, the compile.
  android-driver:
    needs: changes
    if: needs.changes.outputs.cpp == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install --frozen-lockfile
      - name: Fetch SQLite amalgamation
        run: node packages/driver-rn-cpp/scripts/fetch-sqlite.mjs
      - name: Pack workspace packages (rewriting workspace deps to tarballs)
        run: |
          mkdir -p /tmp/packed
          pnpm --filter @remelondb/core pack --pack-destination /tmp/packed
          CORE_TGZ=$(ls /tmp/packed/*core*.tgz)
          node -e "
            const fs = require('fs')
            const path = 'packages/driver-rn-cpp/package.json'
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'))
            pkg.dependencies['@remelondb/core'] = 'file:' + process.argv[1]
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2))
          " "$CORE_TGZ"
          pnpm --filter @remelondb/driver-rn-cpp pack --pack-destination /tmp/packed
      - name: Create RN 0.86 test app
        run: |
          cd /tmp
          npx @react-native-community/cli@latest init WmHarness --version 0.86.0 --pm npm --skip-install --install-pods false
          cd WmHarness
          npm install
          npm install /tmp/packed/*core*.tgz /tmp/packed/*driver-rn-cpp*.tgz
      - name: Build Android (debug)
        run: |
          cd /tmp/WmHarness/android
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Assert the TurboModule is registered (not just linked)
        run: |
          # a green assembleDebug proves nothing about registration: if the
          # CLI rejects the dependency config it generates no glue and the
          # module is silently absent at runtime
          grep -q "RemelonDriver" \
            /tmp/WmHarness/android/app/build/generated/autolinking/src/main/jni/autolinking.cpp
